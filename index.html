<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Syafa Hadyan</title>
    <link rel="apple-touch-icon" href="Icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="Icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" href="Icons/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="profile">
      <img src="Images/Profile.png" alt="Profile" />
    </div>
    <div class="name">
      <h1>Syafa Hadyan Rasendriya</h1>
    </div>
    <div class="github-stats">
      <img
        src="https://github-readme-stats-amber-beta-62.vercel.app/api?username=SyafaHadyan&count_private=true&show_icons=true&include_all_commits=true&theme=dracula"
        alt="GitHub Stats"
      />
      <img
        src="https://github-readme-stats-amber-beta-62.vercel.app/api/top-langs/?username=SyafaHadyan&amp;theme=dracula&amp;langs_count=10"
        alt="Top Languages"
      />
      <img
        src="https://github-profile-trophy.vercel.app/?username=SyafaHadyan&theme=dracula"
        alt="GitHub Trophy"
      />
    </div>
    <div class="latest-commit">
      <div class="commit-container"></div>
      <script src="index.js"></script>
      <script>
        fetch('https://api.github.com/users/SyafaHadyan/repos')
          .then(response => response.json())
          .then(data => {
            const repos = data.map(repo => {
              const repoElement = document.createElement('div');
              repoElement.innerHTML = `<a href="${repo.html_url}" target="_blank">${repo.name}</a>`;
              return repoElement;
            });
            const repoContainer = document.createElement('div');
            repoContainer.classList.add('repo-container');
            repos.forEach(repo => repoContainer.appendChild(repo));
            document.body.appendChild(repoContainer);
          })
          .catch(error => console.error(error));
  
          fetch('https://gh-pinned-repos-5l2i19um3.vercel.app/?username=SyafaHadyan')
          .then(response => response.json())
          .then(data => {
            const pushEvents = data.filter(event => event.type === 'PushEvent');
            const latestCommits = pushEvents.slice(0, 10).map(event => {
              const commitMessage = event.payload.commits[0].message;
              const commitDate = new Date(event.created_at).toLocaleDateString();
              const commitElement = document.createElement('div');
              commitElement.innerHTML = `Latest commit: ${commitMessage} on ${commitDate}`;
              return commitElement;
            });
            const commitContainer = document.querySelector('.commit-container');
            latestCommits.forEach(commit => commitContainer.appendChild(commit));
          })
          .catch(error => console.error(error));
      </script>
    </div>
    <div class="links">
      <a
        href="https://github.com/SyafaHadyan"
        title="SyafaHadyan"
        target="_blank"
        style="text-decoration:none"
        ><img src="Images/GitHub.png" alt="GitHub" />
      </a>
      <a
        href="https://replit.com/@SyafaHadyan"
        title="@SyafaHadyan"
        target="_blank"
        style="text-decoration:none"
        ><img src="Images/Replit.png" alt="Replit" />
      </a>
    </div>
  </body>
</html>
